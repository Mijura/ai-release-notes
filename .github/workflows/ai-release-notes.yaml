name: Release from merged PR

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    name: Generate release notes and tag version
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Get latest tag
        id: latest_tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate release label
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'

          echo "PR labels: $LABELS"

          COUNT=0

          if echo "$LABELS" | grep -q "release:major"; then
            COUNT=$((COUNT + 1))
          fi

          if echo "$LABELS" | grep -q "release:minor"; then
            COUNT=$((COUNT + 1))
          fi

          if echo "$LABELS" | grep -q "release:patch"; then
            COUNT=$((COUNT + 1))
          fi

          if [ "$COUNT" -eq 0 ]; then
            echo "Missing release label."
            echo "Add one of: release:patch, release:minor, release:major"
            exit 1
          fi

          if [ "$COUNT" -gt 1 ]; then
            echo "Multiple release labels found."
            echo "Use only one of: release:patch, release:minor, release:major"
            exit 1
          fi

      - name: Calculate next version from PR label
        id: version
        run: |
          LATEST="${{ steps.latest_tag.outputs.tag }}"
          VERSION="${LATEST#v}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'

          if echo "$LABELS" | grep -q "release:major"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$LABELS" | grep -q "release:minor"; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif echo "$LABELS" | grep -q "release:patch"; then
            PATCH=$((PATCH + 1))
          fi

          NEXT="v$MAJOR.$MINOR.$PATCH"

          echo "Latest version: $LATEST"
          echo "Next version: $NEXT"

          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Collect release context
        run: |
          LATEST="${{ steps.latest_tag.outputs.tag }}"

          echo "Latest tag: $LATEST"

          if [ "$LATEST" = "v0.0.0" ]; then
            git log --pretty=format:"- %s (%h)" > commits.txt

            git diff --stat HEAD~1..HEAD > diff_stat.txt || true

            git diff --no-ext-diff --unified=3 HEAD~1..HEAD \
              -- \
              ':!package-lock.json' \
              ':!yarn.lock' \
              ':!pnpm-lock.yaml' \
              ':!dist/**' \
              ':!build/**' \
              ':!coverage/**' \
              ':!*.snap' \
              > diff.txt || true
          else
            git log "$LATEST"..HEAD --pretty=format:"- %s (%h)" > commits.txt

            git diff --stat "$LATEST"..HEAD > diff_stat.txt

            git diff --no-ext-diff --unified=3 "$LATEST"..HEAD \
              -- \
              ':!package-lock.json' \
              ':!yarn.lock' \
              ':!pnpm-lock.yaml' \
              ':!dist/**' \
              ':!build/**' \
              ':!coverage/**' \
              ':!*.snap' \
              > diff.txt
          fi

          echo "Commits:"
          cat commits.txt || true

          echo ""
          echo "Diff summary:"
          cat diff_stat.txt || true

          echo ""
          echo "Diff collected."

      - name: Limit diff size
        run: |
          MAX_BYTES=60000

          if [ -f diff.txt ]; then
            SIZE=$(wc -c < diff.txt)
            echo "Original diff size: $SIZE bytes"

            if [ "$SIZE" -gt "$MAX_BYTES" ]; then
              echo "Diff is too large. Truncating to $MAX_BYTES bytes."
              head -c "$MAX_BYTES" diff.txt > diff_limited.txt
              echo "" >> diff_limited.txt
              echo "" >> diff_limited.txt
              echo "[Diff truncated because it was too large.]" >> diff_limited.txt
              mv diff_limited.txt diff.txt
            fi
          fi

      - name: Generate release notes with AI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          COMMITS=$(cat commits.txt || true)
          DIFF_STAT=$(cat diff_stat.txt || true)
          DIFF=$(cat diff.txt || true)

          VERSION="${{ steps.version.outputs.next }}"
          RELEASE_DATE=$(date -u +"%Y-%m-%d")
          RELEASE_TIME=$(date -u +"%H:%M UTC")
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_BODY="${{ github.event.pull_request.body }}"

          PROMPT=$(cat <<EOF
          Write GitHub release notes for version $VERSION.

          The first line MUST use this exact version header (fill in date and time only from the values provided—do not invent dates):
          **Version $VERSION — $RELEASE_DATE, $RELEASE_TIME**

          Then output the changelog using EXACTLY this Markdown structure and spacing:

          ### Changelog
          ___

          **New**

          - Added **[Feature Name]** - [short description]
          - Introduced **[New Component/Architecture]** - [short description]
          - Implemented **[Capability]** - [short description]
          - Added **[Integration/Provider]** - [short description]

          **Changes**

          - [Describe changed behavior, export, API, config, or default]
          - [Describe improvement or refactor]

          **Bug Fixes**

          - Fixed an issue where [problem description]
          - Fixed [specific bug or incorrect behavior]

          ----

          Replace bracketed placeholders with real content derived from the materials below. For **New**, pick whichever bullet stem fits each item (Added / Introduced / Implemented / Added for integrations)—you do not need every stem if unused. Use **bold** for the short title in each **New** bullet as in the template.

          Section omission (mandatory): Do not output a **New**, **Changes**, or **Bug Fixes** heading unless that section has at least one real bullet. If there are no new features, omit **New** entirely (heading and bullets). If there are no meaningful behavior/API/config/default changes or improvements, omit **Changes** entirely. If there are no bug fixes, omit **Bug Fixes** entirely. Never print placeholder bullets, "none", or empty sections to pad the template.

          Context:

          Pull request:
          #$PR_NUMBER - $PR_TITLE

          Pull request description:
          $PR_BODY

          Commit messages:
          $COMMITS

          Diff summary:
          $DIFF_STAT

          Code diff:
          $DIFF

          Instructions:
          - Base the release notes mainly on the actual code diff.
          - Use the PR title, PR description, and commit messages as supporting context only.
          - Focus on user-facing changes.
          - Do not mention internal refactors unless they affect users.
          - Ignore generated files, lock files, formatting-only changes, and test-only changes unless they matter to users.
          - Omit **New**, **Changes**, and **Bug Fixes** sections that would otherwise be empty; only include headings that have bullets.
          - Keep wording concise and factual.
          EOF
          )

          jq -n \
            --arg prompt "$PROMPT" \
            '{
              model: "gpt-4o-mini",
              input: $prompt
            }' > request.json

          HTTP_STATUS=$(curl -s -w "%{http_code}" -o response.json https://api.openai.com/v1/responses \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @request.json)

          echo "OpenAI HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "OpenAI API request failed:"
            cat response.json
            exit 1
          fi

          jq -r '
            [
              .output[]
              | select(.type == "message")
              | .content[]
              | select(.type == "output_text")
              | .text
            ]
            | join("\n")
          ' response.json > release_notes.md

          if [ ! -s release_notes.md ] || [ "$(cat release_notes.md)" = "null" ]; then
            echo "No release notes were generated."
            echo "OpenAI response was:"
            cat response.json
            exit 1
          fi

          echo "Generated release notes:"
          cat release_notes.md

      - name: Create and push version tag
        run: |
          VERSION="${{ steps.version.outputs.next }}"

          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.next }}"

          gh release create "$VERSION" \
            --target main \
            --title "$VERSION" \
            --notes-file release_notes.md